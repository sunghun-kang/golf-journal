<script>
var data = [];

// =============================================
// Google Apps Script 연동
// =============================================
var GAS_URL = 'https://script.google.com/macros/s/AKfycbxKONJngKyFZnC4XXqwZmu--sZaDR-sdR6DLylt6pA_HX8jDCbXViVLaVcI-RR2uRPq/exec'; // 여기에 배포 URL 입력

function loadFromServer() {
  if (!GAS_URL) { render(); return; }
  showSyncStatus('불러오는중...');
  var cbName = 'gasCallback_' + Date.now();
  var script = document.createElement('script');
  window[cbName] = function(d) {
    delete window[cbName];
    document.body.removeChild(script);
    if (Array.isArray(d) && d.length > 0) {
      data = d;
      save();
      serverLoaded = true;
      showSyncStatus('✅ 불러옴 ('+data.length+'개)');
    } else {
      serverLoaded = true;
      showSyncStatus('💾 로컬 데이터 사용중 ('+data.length+'개)');
    }
    render();
  };
  script.onerror = function() {
    delete window[cbName];
    document.body.removeChild(script);
    render();
    showSyncStatus('⚠️ 오프라인 모드 (로컬: '+data.length+'개)');
  };
  script.src = GAS_URL + '?callback=' + cbName;
  document.body.appendChild(script);
}

function saveToServer() {
  save();
  if (!GAS_URL) { showSyncStatus('💾 로컬 저장됨'); return; }
  showSyncStatus('저장중...');
  fetch(GAS_URL, {
    method: 'POST',
    mode: 'no-cors',
    body: JSON.stringify(data),
    headers: {'Content-Type': 'text/plain'}
  })
  .then(function(){ showSyncStatus('✅ 서버 저장완료'); })
  .catch(function(){ showSyncStatus('💾 로컬 저장됨 (오프라인)'); });
}

function toggleMore(){
  var d=document.getElementById('more-dropdown');
  d.classList.toggle('open');
}
document.addEventListener('click', function(e){
  if(!e.target.closest('.more-menu')) document.getElementById('more-dropdown').classList.remove('open');
});

function showSyncStatus(msg) {
  var el = document.getElementById('sync-status');
  var icon = document.getElementById('conn-icon');
  if (el) { el.textContent = msg; setTimeout(function(){ el.textContent=''; }, 3000); }
  if (icon) {
    if (msg.indexOf('✅') >= 0) {
      icon.textContent = '🔵';
      icon.title = '서버 연결됨';
    } else if (msg.indexOf('오프라인') >= 0 || msg.indexOf('로컬') >= 0) {
      icon.textContent = '🔴';
      icon.title = '로컬 저장 (오프라인)';
    }
  }
}

function openSettings() {
  var url = prompt('Google Apps Script 배포 URL을 입력하세요:', GAS_URL);
  if (url !== null) {
    GAS_URL = url.trim();
    localStorage.setItem('gasUrl', GAS_URL);
    if (GAS_URL) loadFromServer();
  }
}


// ID 및 updatedAt 초기화
data.forEach(function(r){
  if(!r.important)r.important=false;
  if(!r.id)r.id=r.date+"_"+(r.title||"").substring(0,10).replace(/\s/g,"_")+"_"+Math.random().toString(36).substr(2,4);
  if(!r.updatedAt)r.updatedAt=r.date+"T00:00:00.000Z";
});

function openPhoto(recIdx, mediaIdx){
  var r=data[recIdx];
  if(!r||!r.media) return;
  var imgs=r.media.filter(function(m){return m.type==='image';});
  if(!imgs[mediaIdx]) return;
  var modal=document.getElementById('photo-modal');
  document.getElementById('photo-modal-img').src=imgs[mediaIdx].data;
  modal.style.display='flex';
}
function closePhoto(){
  document.getElementById('photo-modal').style.display='none';
}

function mergeData(local,server){
  var map={};
  // id 없는 항목에 임시 id 부여
  function ensureId(r){
    if(!r.id) r.id=r.date+'_'+(r.title||'').substring(0,10).replace(/\s/g,'_')+'_x';
    if(!r.updatedAt) r.updatedAt=r.date+'T00:00:00.000Z';
    return r;
  }
  server.forEach(function(r){r=ensureId(r); map[r.id]=r;});
  local.forEach(function(r){
    r=ensureId(r);
    if(!map[r.id]||r.updatedAt>=map[r.id].updatedAt)map[r.id]=r;
  });
  var merged=Object.values(map);
  merged.sort(function(a,b){return b.date.localeCompare(a.date);});
  return merged;
}

function dow(ds){
  var d=new Date(ds+'T00:00:00');
  return['일','월','화','수','목','금','토'][d.getDay()];
}
function dowN(ds){
  var d=new Date(ds+'T00:00:00');
  return d.getDay(); // 0=일,6=토
}
function esc(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}
function hilite(s){return esc(s).replace(/유레카/g,'<span style="color:#d42020;font-weight:700">유레카</span>');}

var calY=new Date().getFullYear(), calM=new Date().getMonth();

function swTab(t){
  var isL = t==='list';
  document.getElementById('tb-list').classList.toggle('active', isL);
  document.getElementById('tb-cal').classList.toggle('active', !isL);
  document.getElementById('tb-list').style.background = isL ? 'rgba(255,255,255,0.4)' : 'rgba(255,255,255,0.15)';
  document.getElementById('tb-cal').style.background = !isL ? 'rgba(255,255,255,0.4)' : 'rgba(255,255,255,0.15)';
  document.getElementById('list-sec').style.display = isL ? '' : 'none';
  document.getElementById('cal-sec').style.display = isL ? 'none' : 'block';
  if(!isL) renderCal();
}

function calPrev(){ calM--; if(calM<0){calM=11;calY--;} renderCal(); }
function calNext(){ calM++; if(calM>11){calM=0;calY++;} renderCal(); }

function renderCal(){
  var today=new Date().toISOString().slice(0,10);
  document.getElementById('cal-title').textContent=calY+'년 '+(calM+1)+'월';
  var dows=['일','월','화','수','목','금','토'];
  var h='';
  var dcls=['csun','','','','','','csat'];
  dows.forEach(function(d,i){ h+='<div class="cal-dow" style="'+(i===0?'color:#d42020':i===6?'color:#1a8a1a':'')+'" >'+d+'</div>'; });

  var fF=document.getElementById('flt-f').checked;
  var fS=document.getElementById('flt-s').checked;
  var fStar=document.getElementById('flt-star').checked;
  var fN=true;
  var dm={};
  data.forEach(function(r){
    var show=false;
    if(fF && r.vt==='F') show=true;
    if(fS && r.vt==='S') show=true;
    if(fStar && r.important) show=true;
    if(fN && r.vt!=='F' && r.vt!=='S' && !r.important) show=true;
    if(!show) return;
    if(!dm[r.date])dm[r.date]=[];
    dm[r.date].push(r);
  });

  var first=new Date(calY,calM,1), last=new Date(calY,calM+1,0);
  for(var i=0;i<first.getDay();i++) h+='<div class="cal-cell other"></div>';

  for(var d=1;d<=last.getDate();d++){
    var ds=calY+'-'+String(calM+1).padStart(2,'0')+'-'+String(d).padStart(2,'0');
    var dw=new Date(calY,calM,d).getDay();
    var isHol=HOLIDAYS.has(ds);
    var holName=isHol?HOLIDAYS.get(ds):'';
    var cc='cal-cell'+(dw===0||isHol?' csun'+(isHol?' chol':''):dw===6?' csat':'')+(ds===today?' today':'');
    h+='<div class="'+cc+'"><div class="cal-dn">'+d+(holName?'<span style="font-size:0.6rem;font-weight:400;margin-left:2px;color:#d42020">'+esc(holName)+'</span>':'')+'</div>';
    if(dm[ds]){
      var recs=dm[ds];
      recs.forEach(function(r,i){
        if(i>=3){ if(i===3) h+='<span style="font-size:0.65rem;color:#999;padding:0 2px">+'+(recs.length-3)+'개</span>'; return; }
        var tc=r.vt==='F'?'tf':r.important?'ti':r.vt==='S'?'ts':'tn';
        var member1=r.members?(r.members.split(/[,\s]+/).filter(Boolean)[0]||''):'';
        var tagTxt;
        if(r.vt==='F'){
          tagTxt=esc(r.venue||'필드');
        } else if(r.vt==='S'){
          tagTxt='S '+esc(r.venue||'스크린');
        } else {
          tagTxt=esc((r.title||'').slice(0,10));
        }
        if(member1) tagTxt+=' '+esc(member1);
        h+='<span class="ctag '+tc+'" data-date="'+ds+'">'+tagTxt+'</span>';
      });
    }
    h+='</div>';
  }
  var tot=first.getDay()+last.getDate(), rem=tot%7===0?0:7-tot%7;
  for(var i=0;i<rem;i++) h+='<div class="cal-cell other"></div>';
  var grid=document.getElementById('cal-grid');
  grid.innerHTML=h;
  // 이벤트 위임으로 클릭 처리
  grid.onclick=function(e){
    var tag=e.target.closest('.ctag');
    if(tag) showCpop(tag.dataset.date);
  };
}

function showCpop(ds){
  var recs=data.filter(function(r){return r.date===ds;});
  if(!recs.length) return;
  var dows=['일','월','화','수','목','금','토'];
  document.getElementById('cpop-dt').textContent=ds+' ('+dows[new Date(ds).getDay()]+')';
  var b='';
  recs.forEach(function(r){
    var cc=r.important?'ci':r.vt==='F'?'cf':r.vt==='S'?'cs':'';
    var tags='';
    if(r.vt==='F') tags+='<span class="cpop-tag" style="background:#2d7a2d">F 필드</span>';
    if(r.vt==='S') tags+='<span class="cpop-tag" style="background:#1a4d9e">S 스크린</span>';
    if(r.venue) tags+='<span class="cpop-tag" style="background:#888">'+esc(r.venue)+'</span>';
    if(r.members) tags+='<span class="cpop-tag" style="background:#4a7a4a">👤'+esc(r.members)+'</span>';
    if(r.important) tags+='<span class="cpop-tag" style="background:#d42020">🔴 중요</span>';
    var tc='cpop-title'+(r.important?' imp':r.bold?' bold':'');
    b+='<div class="cpop-card '+cc+'">'
      +(tags?'<div class="cpop-tags">'+tags+'</div>':'')
      +'<div class="'+tc+'">'+hilite(r.title)+'</div>'
      +(r.memo?'<div class="cpop-memo">'+hilite(r.memo)+'</div>':'')
      +'</div>';
  });
  document.getElementById('cpop-bd').innerHTML=b;
  document.getElementById('cpop').classList.add('on');
}
function closeCpop(){ document.getElementById('cpop').classList.remove('on'); }
document.addEventListener('click',function(e){
  var pop=document.getElementById('cpop');
  if(pop && pop.classList.contains('on') && e.target===pop) closeCpop();
});


function render(){
  var q=document.getElementById('q').value.toLowerCase();
  var fF=document.getElementById('flt-f').checked;
  var fS=document.getElementById('flt-s').checked;
  var fStar=document.getElementById('flt-star').checked;
  var fN=true;
  var html=''; var shown=0;
  var lastYear=''; var lastMonth='';
  for(var i=0;i<data.length;i++){
    var r=data[i];
    var text=(r.title+' '+(r.memo||'')+' '+(r.venue||'')).toLowerCase();
    if(q && text.indexOf(q)<0) continue;
    // vt/중요 필터 (OR 방식)
    var show = false;
    if(fF && r.vt==='F') show=true;
    if(fS && r.vt==='S') show=true;
    if(fStar && r.important) show=true;
    if(fN && r.vt!=='F' && r.vt!=='S' && !r.important) show=true;
    if(!show) continue;
    shown++;

    var yr=r.date.slice(0,4); var mo=r.date.slice(0,7);
    if(!q){
      if(yr!==lastYear){
        html+='<div class="div-year">'+yr+'년</div>';
        lastYear=yr; lastMonth='';
      }
      if(mo!==lastMonth){
        var mNum=parseInt(r.date.slice(5,7));
        html+='<div class="div-month">'+mNum+'월</div>';
        lastMonth=mo;
      }
    }

    var dw=dowN(r.date);
    var isHol=HOLIDAYS.has(r.date);
    var holName=isHol?HOLIDAYS.get(r.date):'';
    var dateColor=(dw===0||isHol)?'sun':(dw===6?'sat':'');
    var dateStr=r.date+'('+dow(r.date)+(holName?', '+holName:'')+')'; 

    var cardCls='card'+(r.important?' important':r.vt==='F'?' field':r.vt==='S'?' screen':'');
    var vtHtml=r.vt==='F'?'<span class="vt vt-f">F</span>':r.vt==='S'?'<span class="vt vt-s">S</span>':'';
    var venueHtml=r.venue?'<span class="venue">'+esc(r.venue)+'</span>':'';
    var member1=r.members?(r.members.split(/[,\s]+/).filter(Boolean)[0]||''):'';
    var memberHtml=member1?'<span class="venue" style="background:#e8f0e8;color:#2d6a2d">👤'+esc(member1)+'</span>':'';
    var memoHtml=r.memo?'<div class="memo">'+hilite(r.memo)+'</div>':'';

    // 미디어 표시
    var mediaHtml='';
    if(r.media&&r.media.length){
      mediaHtml='<div style="display:flex;flex-wrap:wrap;gap:6px;margin-top:8px">';
      r.media.forEach(function(m){
        if(m.type==='image'){
          mediaHtml+='<img src="'+m.data+'" style="max-width:160px;max-height:120px;border-radius:6px;border:1px solid #ddd;cursor:pointer" onclick="this.style.maxWidth=this.style.maxWidth===\'100%\'?\'160px\':\'100%\'">';
        } else {
          mediaHtml+='<video src="'+m.data+'" controls style="max-width:240px;max-height:160px;border-radius:6px;border:1px solid #ddd"></video>';
        }
      });
      mediaHtml+='</div>';
    }

    var hasBody=r.memo||mediaHtml;
    html+='<div class="'+cardCls+'" id="c'+i+'">'
      +'<div class="row" onclick="tog('+i+')">'
      +'<div class="row-top">'
      +(r.important?'<span style="color:#d42020;font-weight:700">★</span>':'')
      +'<span class="date '+dateColor+'">'+dateStr+'</span>'
      +vtHtml+venueHtml+memberHtml
      +'<span class="acts" onclick="event.stopPropagation()">'
      +(hasBody?'<button class="btn-view" id="vb'+i+'" onclick="tog('+i+')">내용보기</button>':'')
      +'<button onclick="ed('+i+')">수정</button>'
      +'<button onclick="dl('+i+')">삭제</button>'
      +'</span></div>'
      +(function(){
      var s='';
      if(r.bold)s+='font-weight:700;';
      if(r.color==='red')s+='color:#c00;';
      else if(r.color==='green')s+='color:#1a7a1a;';
      else if(r.color==='blue')s+='color:#1a4d9e;';
      var thumbs='';
      if(r.media&&r.media.length){
        var imgs=r.media.filter(function(m){return m.type==='image';}).slice(0,3);
        imgs.forEach(function(m,idx){
          thumbs+='<img src="'+m.data+'" data-idx="'+i+'" data-midx="'+idx+'" class="thumb-img" style="width:36px;height:36px;object-fit:cover;border-radius:4px;border:1px solid #ccc;cursor:pointer;flex-shrink:0" onclick="event.stopPropagation();openPhoto('+i+','+idx+')">';
        });
      }
      return '<div style="display:flex;align-items:center;justify-content:space-between;gap:4px"><div class="title" style="'+s+'">'+hilite(r.title)+'</div>'+(thumbs?'<div style="display:flex;gap:3px;flex-shrink:0">'+thumbs+'</div>':'')+'</div>';
    })()
      +'</div>'
      +'<div class="body" id="b'+i+'">'+(memoHtml)+(mediaHtml)+'</div>'
      +'</div>';
  }
  document.getElementById('list').innerHTML=html||'<div style="padding:40px;color:#aaa">검색 결과 없음</div>';
  document.getElementById('cnt').textContent='총 '+shown+'개';
}

function tog(i){
  var b=document.getElementById('b'+i);
  var vb=document.getElementById('vb'+i);
  if(!b)return;
  var open=b.style.display==='block';
  b.style.display=open?'none':'block';
  if(vb)vb.textContent=open?'내용보기':'닫기';
}

function openAdd(){
  if(!serverLoaded){alert("서버에서 데이터를 불러오는 중입니다. 잠시 후 다시 시도하세요.");return;}
  editIdx=-1;

  document.getElementById('mDate').value=new Date().toISOString().split('T')[0];

  document.getElementById('mVenue').value='';

function ed(i){
  editIdx=i; var r=data[i];
  document.getElementById('mtitle').textContent='기록 수정';
  document.getElementById('mDate').value=r.date;
  document.getElementById('mVt').value=r.vt||'';
  document.getElementById('mVenue').value=r.venue||'';
  document.getElementById('mMembers').value=r.members||'';
  document.getElementById('mTitle').value=r.title||'';
  document.getElementById('mMemo').value=r.memo||'';
  document.getElementById('mImp').checked=!!r.important;
  var colorVal=r.color||'';
  document.querySelectorAll('input[name=mColor]').forEach(function(rd){rd.checked=(rd.value===colorVal);});
  document.getElementById('mBold').checked=!!r.bold;
  document.getElementById('mMedia').value='';
  pendingMedia=r.media?r.media.slice():[];
  renderMediaPreview();
  document.getElementById('ov').classList.add('open');
}
var pendingMedia=[];

function renderMediaPreview(){
  var p=document.getElementById('mMediaPreview');
  p.innerHTML='';
  pendingMedia.forEach(function(m,idx){
    var wrap=document.createElement('div');
    wrap.style.cssText='position:relative;display:inline-block';
    var el=m.type==='image'?document.createElement('img'):document.createElement('video');
    el.src=m.data; el.style.cssText='max-width:100px;max-height:80px;border-radius:5px;border:1px solid #ccc';
    if(m.type==='video'){el.controls=true;}
    var btn=document.createElement('button');
    btn.textContent='✕'; btn.dataset.idx=idx;
    btn.style.cssText='position:absolute;top:-4px;right:-4px;background:#e44;color:#fff;border:none;border-radius:50%;width:18px;height:18px;font-size:10px;cursor:pointer;padding:0;line-height:18px';
    btn.onclick=function(){pendingMedia.splice(+this.dataset.idx,1);renderMediaPreview();};
    wrap.appendChild(el); wrap.appendChild(btn);
    p.appendChild(wrap);
  });
}

document.getElementById('mMedia').addEventListener('change',function(e){
  var files=Array.from(e.target.files);
  var readers=files.map(function(file){
    return new Promise(function(resolve){
      var reader=new FileReader();
      reader.onload=function(ev){
        resolve({type:file.type.startsWith('image')?'image':'video', data:ev.target.result});
      };
      reader.readAsDataURL(file);
    });
  });
  Promise.all(readers).then(function(results){
    pendingMedia=pendingMedia.concat(results);
    renderMediaPreview();
  });
});

function save(){
  try{localStorage.setItem('golfLog',JSON.stringify(data));}catch(e){}
}

function saveMod(){
  var date=document.getElementById('mDate').value;
  var title=document.getElementById('mTitle').value.trim();
  if(!date||!title){alert('날짜와 키워드는 필수!');return;}
  var now = new Date().toISOString();
  var rec={
    date:date,vt:document.getElementById('mVt').value,
    venue:document.getElementById('mVenue').value.trim(),
    members:document.getElementById('mMembers').value.trim(),
    title:title,memo:document.getElementById('mMemo').value.trim(),
    important:document.getElementById('mImp').checked,
    color:document.querySelector('input[name=mColor]:checked').value,
    bold:document.getElementById('mBold').checked,
    media:pendingMedia.slice(),
    updatedAt: now
  };
  if(editIdx>=0){
    rec.id = data[editIdx].id || (date+'_'+(title||'').substring(0,10).replace(/\s/g,'_')+'_'+Math.random().toString(36).substr(2,4));
    data[editIdx]=rec;
  } else {
    rec.id = date+'_'+(title||'').substring(0,10).replace(/\s/g,'_')+'_'+Math.random().toString(36).substr(2,4);
    data.push(rec);
  }
  data.sort(function(a,b){return b.date.localeCompare(a.date);});
  saveToServer(); closeOv(); render();
}

function exportFile(){
  var blob=new Blob([JSON.stringify(data,null,2)],{type:'application/json'});
  var a=document.createElement('a');
  a.href=URL.createObjectURL(blob);
  a.download='golf-log-'+new Date().toISOString().slice(0,10)+'.json';
  a.click();
}
// 파일에서 불러오기
function importFile(){
  var input=document.createElement('input');
  input.type='file'; input.accept='.json';
  input.onchange=function(e){
    var file=e.target.files[0]; if(!file)return;
    var reader=new FileReader();
    reader.onload=function(ev){
      try{
        var imported=JSON.parse(ev.target.result);
        if(!Array.isArray(imported))throw new Error();
        if(!confirm('불러온 데이터 '+imported.length+'개로 교체할까요?\n(현재 데이터는 사라집니다)'))return;
        data=imported;
        saveToServer(); render();
        alert('불러오기 완료!');
      }catch(e){alert('파일 형식이 올바르지 않습니다.');}
    };
    reader.readAsText(file);
  };
  input.click();
}

function fltChange(type){
  if(type==='all'){
    var all=document.getElementById('flt-all').checked;
    document.getElementById('flt-f').checked=all;
    document.getElementById('flt-s').checked=all;
    document.getElementById('flt-star').checked=all;
    
  } else {
    var f=document.getElementById('flt-f').checked;
    var s=document.getElementById('flt-s').checked;
    var star=document.getElementById('flt-star').checked;
    var n=true;
    document.getElementById('flt-all').checked=(f&&s&&star&&n);
  }
  render(); renderCal();
}
