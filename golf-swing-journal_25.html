<style>


*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Apple SD Gothic Neo','Malgun Gothic',sans-serif;background:#efefea;color:#222;font-size:14px}
.top{background:#1b3a1b;color:#fff;padding:8px 12px;position:sticky;top:0;z-index:20;display:flex;justify-content:space-between;align-items:center}

.cpop-card{border-left:4px solid #ccc;border-radius:0 8px 8px 0;padding:10px 12px;margin-bottom:8px;background:#fafaf8;}

</style>
</head>

<script>
var data = [];

function nowKST() {
  var d = new Date();
  var kst = new Date(d.getTime() + 9 * 60 * 60 * 1000);
  return kst.toISOString().replace('Z', '+09:00');
}
function todayKST() {
  var d = new Date();
  var kst = new Date(d.getTime() + 9 * 60 * 60 * 1000);
  return kst.toISOString().slice(0, 10);
}

// =============================================
// Google Apps Script 연동
// =============================================
var SUPABASE_URL = 'https://qnbpavvcpxjhccppiqav.supabase.co';
var SUPABASE_KEY = 'sb_publishable_OtaDk4iYFhZJs5GBUz7btw_mOtE5MJP';



function loadFromServer() {
  showSyncStatus('불러오는중...');
  fetch(SUPABASE_URL + '/rest/v1/golf_log?id=eq.main&select=data', {
    headers: { 'apikey': SUPABASE_KEY, 'Authorization': 'Bearer ' + SUPABASE_KEY }
  })
  .then(function(r){ return r.json(); })
  .then(function(j){
    var d = j[0] && j[0].data;
    if (Array.isArray(d) && d.length > 0) {
      var localData = data.slice();
      data = mergeData(localData, d);
      save();
      serverLoaded = true;
      showSyncStatus('✅ 동기화완료 ('+data.length+'개)');
    } else {
      serverLoaded = true;
      showSyncStatus('💾 로컬 데이터 사용중 ('+data.length+'개)');
    }
    render();
  })
  .catch(function(){
    serverLoaded = true;
    render();
    showSyncStatus('⚠️ 오프라인 모드 (로컬: '+data.length+'개)');
  });
}

function saveToServer() {
  save();
  showSyncStatus('저장중...');
  fetch(SUPABASE_URL + '/rest/v1/golf_log?id=eq.main', {
    method: 'PATCH',
    headers: {
      'Content-Type': 'application/json',
      'apikey': SUPABASE_KEY,
      'Authorization': 'Bearer ' + SUPABASE_KEY,
      'Prefer': 'return=minimal'
    },
    body: JSON.stringify({data: data, updated_at: new Date().toISOString()})
  })
  .then(function(response){
    // HTTP 4xx/5xx 명시적 감지 - silent fail 방지
    if(!response.ok){
      alert('⚠️ 서버 저장 실패! (HTTP '+response.status+')\n\n로컬에만 저장됐어요. 사진이 너무 크거나 서버 용량 초과일 수 있습니다.\n잠시 후 🔄로 다시 시도해보세요.');
      showSyncStatus('❌ 서버 저장실패 (HTTP '+response.status+')');
      throw new Error('http_'+response.status);
    }
    showSyncStatus('✅ 서버 저장완료 ('+data.length+'개)');
  })
  .catch(function(err){
    if(err && err.message && err.message.indexOf('http_')===0) return; // 이미 알림함
    showSyncStatus('💾 로컬 저장됨 (오프라인)');
  });
}

function toggleMore(){
  var d=document.getElementById('more-dropdown');
  d.classList.toggle('open');
}
document.addEventListener('click', function(e){
  if(!e.target.closest('.more-menu')) document.getElementById('more-dropdown').classList.remove('open');
});

function showSyncStatus(msg) {
  var el = document.getElementById('sync-status');
  var icon = document.getElementById('conn-icon');
  if (el) { el.textContent = msg; setTimeout(function(){ el.textContent=''; }, 3000); }
  if (icon) {
    if (msg.indexOf('✅') >= 0) {
      icon.textContent = '🔵';
      icon.title = '서버 연결됨';

function mergeData(local,server){
  var map={};
  function ensureId(r){
    if(!r.id) r.id=r.date+'_'+(r.title||'').substring(0,10).replace(/\s/g,'_')+'_x';
    if(!r.updatedAt) r.updatedAt=r.date+'T00:00:00.000Z';
    if(!r.createdAt) r.createdAt=r.updatedAt;  // 기존 데이터 마이그레이션
    return r;
  }
  // 로컬 먼저 넣고
  local.forEach(function(r){r=ensureId(r); map[r.id]=r;});
  // 서버: 더 최신이면 채택하되, 로컬 사진/영상은 손실 보호
  server.forEach(function(r){
    r=ensureId(r);
    var localR=map[r.id];
    if(!localR){ map[r.id]=r; return; }
    // 서버가 더 최신일 때만 덮어씀 (같은 시각이면 로컬 우선)
    if(r.updatedAt > localR.updatedAt){
      // 로컬에 미디어 있고 서버는 없으면 → 미디어 보존
      if(localR.media && localR.media.length>0 && (!r.media || r.media.length===0)){
        r.media = localR.media;
      }
      // createdAt도 더 오래된 것 우선 (최초 등록 시각 보호)
      if(localR.createdAt && (!r.createdAt || localR.createdAt < r.createdAt)){
        r.createdAt = localR.createdAt;
      }
      map[r.id]=r;
    }
  });
  var merged=Object.values(map);
  merged.sort(function(a,b){ var dc=b.date.localeCompare(a.date); if(dc!==0)return dc; return (b.createdAt||b.updatedAt||'').localeCompare(a.createdAt||a.updatedAt||''); });
  return merged;
}

function esc(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}
function hilite(s){
  var html=esc(s);
  // URL 자동 링크화 (유튜브는 썸네일 포함)
  html=html.replace(/https?:\/\/[^\s\u3000<']+/g, function(url){
    var trail='';
    var m=url.match(/[.,;:!?)\]]+$/);
    if(m){ trail=m[0]; url=url.slice(0,-trail.length); }
    var ytMatch=url.match(/(?:youtu\.be\/|youtube\.com\/(?:watch\?v=|embed\/|shorts\/))([a-zA-Z0-9_-]{11})/);
    if(ytMatch){
      var vid=ytMatch[1];
      return '<a href="'+url+'" target="_blank" rel="noopener" style="display:inline-flex;align-items:center;gap:6px;background:#fff5f5;border:1px solid #fcc;border-radius:6px;padding:4px 8px;margin:2px 2px;text-decoration:none;color:#c00;font-size:0.85em;vertical-align:middle">'
        +'<img src="https://img.youtube.com/vi/'+vid+'/default.jpg" style="width:48px;height:36px;object-fit:cover;border-radius:3px;flex-shrink:0" loading="lazy" onerror="this.style.display=\'none\'">'
        +'<span>▶ YouTube</span></a>'+trail;
    }
    return '<a href="'+url+'" target="_blank" rel="noopener" style="color:#1a4d9e;text-decoration:underline;word-break:break-all">'+url+'</a>'+trail;
  });
  // 부분 강조 마커
  // 짧은 형식: ㅃX ㅃ(빨강), ㅍX ㅍ(파랑), ㄴX ㄴ(녹색), **X**(굵게)
  html=html.replace(/\*\*([^\*\n][^\*\n]*?)\*\*/g, '<b>$1</b>');
  html=html.replace(/ㅃ([^ㅃ\n]+?)ㅃ/g, '<span style="color:#d42020;font-weight:600">$1</span>');
  html=html.replace(/ㅍ([^ㅍ\n]+?)ㅍ/g, '<span style="color:#1a4d9e;font-weight:600">$1</span>');
  html=html.replace(/ㄴ([^ㄴ\n]+?)ㄴ/g, '<span style="color:#1a7a1a;font-weight:600">$1</span>');
  // 긴 형식(이전 호환): ''Rred''X''Rred'' 등 - 중첩 가능
  html=html.replace(/''BBold''([\s\S]*?)''BBold''/g, '<b>$1</b>');
  html=html.replace(/''Rred''([\s\S]*?)''Rred''/g, '<span style="color:#d42020;font-weight:600">$1</span>');
  html=html.replace(/''BBlue''([\s\S]*?)''BBlue''/g, '<span style="color:#1a4d9e;font-weight:600">$1</span>');
  html=html.replace(/''GGreen''([\s\S]*?)''GGreen''/g, '<span style="color:#1a7a1a;font-weight:600">$1</span>');
  // 유레카 강조
  html=html.replace(/유레카/g,'<span style="color:#d42020;font-weight:700">유레카</span>');
  return html;
}

    return '<div style="display:flex;align-items:flex-start;justify-content:space-between;gap:4px"><div class="title" style="'+s+'">'+hilite(r.title)+'</div>'+(thumbs?'<div style="display:flex;gap:3px;flex-shrink:0">'+thumbs+'</div>':'')+'</div>';
  })()
    +'</div>'
    +'<div class="body" id="b'+i+'">'+(memoHtml)+(mediaHtml)+'</div>'
    +'</div>';
}

function render(){
  var q=document.getElementById('q').value.toLowerCase();
  var fF=document.getElementById('flt-f').checked;
  var fS=document.getElementById('flt-s').checked;
  var fL=document.getElementById('flt-l').checked;
  var fE=document.getElementById('flt-e').checked;
  var fC=document.getElementById('flt-c').checked;
  var fStar=document.getElementById('flt-star').checked;
  var fN=document.getElementById('flt-all').checked;
  var fPin=document.getElementById('flt-pin').checked;
  var matched=[];
  for(var i=0;i<data.length;i++){
    var r=data[i];
    var text=(r.title+' '+(r.memo||'')+' '+(r.venue||'')).toLowerCase();
    if(q && text.indexOf(q)<0) continue;
    // vt/중요 필터 (OR 방식)
    var show = false;
    if(fF && r.vt==='F') show=true;
    if(fS && r.vt==='S') show=true;
    if(fL && r.vt==='L') show=true;
    if(fE && r.vt==='E') show=true;
    if(fC && r.vt==='C') show=true;
    if(fStar && r.important) show=true;
    if(fPin && r.pinned) show=true;
    if(fN && r.vt!=='F' && r.vt!=='S' && r.vt!=='L' && r.vt!=='E' && r.vt!=='C' && !r.important) show=true;
    if(!show) continue;
    matched.push(i);
  }
  var html='';
  // 📌 게시 — 맨 위에 최신 1개만 표시
  var topPin=-1;
  for(var mk=0; mk<matched.length; mk++){ if(data[matched[mk]].pinned){ topPin=matched[mk]; break; } }
  if(topPin>=0){
    html+='<div class="div-pin">📌 게시</div>';
    html+=cardHtml(data[topPin], topPin);
  }
  // 일반 목록 (연/월 구분)
  var lastYear='', lastMonth='';
  matched.forEach(function(i){
    var r=data[i];
    if(i===topPin) return;
    var yr=r.date.slice(0,4), mo=r.date.slice(0,7);
    if(!q){
      if(yr!==lastYear){ html+='<div class="div-year">'+yr+'년</div>'; lastYear=yr; lastMonth=''; }
      if(mo!==lastMonth){ var mNum=parseInt(r.date.slice(5,7)); html+='<div class="div-month">'+mNum+'월</div>'; lastMonth=mo; }
    }
    html+=cardHtml(r, i);
  });
  document.getElementById('list').innerHTML=html||'<div style="padding:40px;color:#aaa">검색 결과 없음</div>';
  document.getElementById('cnt').textContent='총 '+matched.length+'개';
}

    el.src=m.data; el.style.cssText='max-width:100px;max-height:80px;border-radius:5px;border:1px solid #ccc';
    if(m.type==='video'){el.controls=true;}

    btn.textContent='✕'; btn.dataset.idx=idx;
    btn.style.cssText='position:absolute;top:-4px;right:-4px;background:#e44;color:#fff;border:none;border-radius:50%;width:18px;height:18px;font-size:10px;cursor:pointer;padding:0;line-height:18px';
    btn.onclick=function(){pendingMedia.splice(+this.dataset.idx,1);renderMediaPreview();};
    wrap.appendChild(el); wrap.appendChild(btn);

  });
}

document.getElementById('mMedia').addEventListener('change',function(e){
  var files=Array.from(e.target.files);
  var readers=files.map(function(file){
    return new Promise(function(resolve){
      var reader=new FileReader();
      reader.onload=function(ev){
        if(file.type.startsWith('image')){
          // 이미지: 1280px 리사이즈 + JPEG 0.7 압축
          var img=new Image();
          img.onload=function(){
            var MAX=1280, w=img.width, h=img.height;
            if(w>MAX||h>MAX){
              if(w>h){ h=Math.round(h*MAX/w); w=MAX; } else { w=Math.round(w*MAX/h); h=MAX; }
            }
            var canvas=document.createElement('canvas');
            canvas.width=w; canvas.height=h;
            canvas.getContext('2d').drawImage(img,0,0,w,h);
            resolve({type:'image', data:canvas.toDataURL('image/jpeg',0.7)});
          };
          img.onerror=function(){ resolve({type:'image', data:ev.target.result}); };
          img.src=ev.target.result;
        } else {
          // 영상은 그대로 (압축 어려움)
          resolve({type:'video', data:ev.target.result});
        }
      };
      reader.readAsDataURL(file);
    });
  });
  Promise.all(readers).then(function(results){
    pendingMedia=pendingMedia.concat(results);
    renderMediaPreview();
  });
});

    var reader=new FileReader();

  };

}

function exportExcel(){
  // ── 색상 정의 ──────────────────────────────────────────
  var VT_BG  ={'F':'2d7a2d','S':'1a4d9e','L':'7b2fa8','E':'8b4513','C':'dc6400'};
  var VT_LBL ={'F':'필드','S':'스크린','L':'人生','E':'영어','C':'회사'};
  var IMP_BG ='d42020';
  var HDR_BG ='1f497d';

  // ── 공유 문자열 테이블 ─────────────────────────────────
  var sst=[], sstMap={};
  function si(s){ s=String(s||''); if(sstMap[s]===undefined){sstMap[s]=sst.length;sst.push(s);} return sstMap[s]; }

  // ── 스타일 인덱스 매핑 ────────────────────────────────
  // styleIdx: 0=기본, 1=헤더, 2=중요행, 3~7=구분색(F/S/L/E/C), 8=중요+굵게(제목셀)
  // numFmtId=0, fontId, fillId, borderId, xfId 순서로 정의
  // fonts: 0=기본, 1=헤더(흰굵), 2=중요(빨굵), 3~7=vt색(흰굵), 8=중요제목(빨굵)
  // fills: 0=없음, 1=없음(패턴 필수), 2=헤더, 3=중요, 4~8=vt색

  var vtKeys=['F','S','L','E','C'];

  function xmlEsc(s){
    // XML 1.0이 금지하는 제어문자 제거(0x00-0x08, 0x0B, 0x0C, 0x0E-0x1F)
    return String(s||'')
      .replace(/[\x00-\x08\x0B\x0C\x0E-\x1F]/g,'')
      .replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }

  // ── 셀 빌더 ───────────────────────────────────────────
  function sc(col,row,sIdx,strIdx){ return '<c r="'+col+row+'" t="s" s="'+sIdx+'"><v>'+strIdx+'</v></c>'; }

  // ── 행 빌더 ───────────────────────────────────────────
  var cols=['A','B','C','D','E','F','G'];
  function buildRow(rowNum, vals, sIdxArr){
    var cells='';
    for(var i=0;i<vals.length;i++) cells+=sc(cols[i],rowNum,sIdxArr[i],si(vals[i]));
    return '<row r="'+rowNum+'">'+cells+'</row>';
  }

  // ── 데이터 행 생성 (레코드당 2행: 1행=기본정보, 2행=내용) ──────
  var sheetRows='';
  var rowNum=1;
  sheetRows+=buildRow(rowNum,['날짜','구분','중요','장소','동반자','제목'],[1,1,1,1,1,1]);
  rowNum++;

  data.forEach(function(r){
    var vt=r.vt||'';
    var vtIdx=vtKeys.indexOf(vt);
    var isImp=!!r.important;

    var vtBgSIdx  = vtIdx>=0 ? (3+vtIdx) : 0;
    var vtTxtSIdx = vtIdx>=0 ? (9+vtIdx) : 0;
    var otherSIdx = isImp ? 8 : (vtIdx>=0 ? vtTxtSIdx : 0);

    // 1행: 날짜/구분/중요/장소/동반자/제목
    var dows=['일','월','화','수','목','금','토'];
    var dw=r.date?dowN(r.date):1;
    var isHolXl=HOLIDAYS.has(r.date);
    var dateSIdx=(dw===0||isHolXl)?14:(dw===6?15:0); // 일/공휴=빨강, 토=파랑
    var dateStr=r.date ? r.date+'('+dows[dw]+')' : '';
    sheetRows+=buildRow(rowNum,[
      dateStr,
      VT_LBL[vt]||vt||'',
      isImp?'★':'',
      r.venue||'',
      r.members||'',
      r.title||''
    ],[dateSIdx, vtBgSIdx, isImp?8:0, otherSIdx, otherSIdx, otherSIdx]);
    rowNum++;

    // 2행: F열에 내용 (A~E 빈칸)
    var memo=(r.memo||'').replace(/\r?\n/g,' ');
    sheetRows+=buildRow(rowNum,['','','','','',memo],[0,0,0,0,0,otherSIdx]);
    rowNum++;
  });

  // ── SST XML ───────────────────────────────────────────
  var sstXml='<?xml version="1.0" encoding="UTF-8" standalone="yes"?>'
    +'<sst xmlns="http://schemas.openxmlformats.org/spreadsheetml/2006/main" count="'+sst.length+'" uniqueCount="'+sst.length+'">'
    +sst.map(function(s){ return '<si><t xml:space="preserve">'+xmlEsc(s)+'</t></si>'; }).join('')
    +'</sst>';

  // ── Styles XML ────────────────────────────────────────
  function font(color,bold,sz){
    return '<font>'+(bold?'<b/>':'')+'<sz val="'+(sz||11)+'"/><color rgb="FF'+color+'"/><name val="맑은 고딕"/></font>';
  }
  function fill(color){
    if(!color) return '<fill><patternFill patternType="none"/></fill>';
    return '<fill><patternFill patternType="solid"><fgColor rgb="FF'+color+'"/></patternFill></fill>';
  }
  function xf(fontId,fillId,borderId,wrap){
    return '<xf numFmtId="0" fontId="'+fontId+'" fillId="'+fillId+'" borderId="'+borderId+'" xfId="0"'
      +(wrap?' applyAlignment="1"><alignment wrapText="1"/></xf':'/>')+' ';
  }

  // fonts: 0=기본, 1=헤더(흰굵), 3~7=vt흰굵(B배경용), 8=중요빨굵, 9~13=vt컬러굵(나머지)
  var fontsXml='<fonts count="16">'
    +font('000000',false)   // 0 기본
    +font('FFFFFF',true)    // 1 헤더
    +font('000000',false)   // 2 미사용
    +vtKeys.map(function(k){ return font('FFFFFF',true); }).join('') // 3~7 vt 흰굵(B열)
    +font('d42020',true)    // 8 중요 빨굵
    +vtKeys.map(function(k){ return font(VT_BG[k],true); }).join('') // 9~13 vt컬러굵
    +font('d42020',true)    // 14 일/공휴 빨강굵
    +font('1a4d9e',true)    // 15 토 파랑굵
    +'</fonts>';

  // fills: 0=없음, 1=없음(필수), 2=헤더, 3~7=vt색
  var fillsXml='<fills count="'+(3+vtKeys.length)+'">'
    +fill('')+fill('')      // 0,1 필수
    +fill(HDR_BG)           // 2 헤더
    +vtKeys.map(function(k){ return fill(VT_BG[k]); }).join('') // 3~7
    +'</fills>';

  var bordersXml='<borders count="1"><border><left/><right/><top/><bottom/><diagonal/></border></borders>';

  // xfs: 0=기본, 1=헤더, 3~7=vt배경, 8=중요빨굵글자, 9~13=vt컬러굵글자
  var cellXfsXml='<cellXfs>'
    +xf(0,0,0,false)   // 0 기본
    +xf(1,2,0,false)   // 1 헤더
    +xf(0,0,0,false)   // 2 미사용
    +vtKeys.map(function(k,i){ return xf(3+i,3+i,0,false); }).join('') // 3~7 vt배경
    +xf(8,0,0,false)   // 8 중요 빨굵글자
    +vtKeys.map(function(k,i){ return xf(9+i,0,0,false); }).join('') // 9~13 vt컬러굵글자
    +xf(14,0,0,false)  // 14 일/공휴 빨강굵
    +xf(15,0,0,false)  // 15 토 파랑굵
    +'</cellXfs>';

  var stylesXml='<?xml version="1.0" encoding="UTF-8" standalone="yes"?>'
    +'<styleSheet xmlns="http://schemas.openxmlformats.org/spreadsheetml/2006/main">'
    +fontsXml+fillsXml+bordersXml
    +'<cellStyleXfs count="1"><xf numFmtId="0" fontId="0" fillId="0" borderId="0"/></cellStyleXfs>'
    +cellXfsXml
    +'</styleSheet>';

  // ── Sheet XML ─────────────────────────────────────────
  var sheetXml='<?xml version="1.0" encoding="UTF-8" standalone="yes"?>'
    +'<worksheet xmlns="http://schemas.openxmlformats.org/spreadsheetml/2006/main">'
    +'<cols>'
    +'<col min="1" max="1" width="12" customWidth="1"/>'
    +'<col min="2" max="2" width="8" customWidth="1"/>'
    +'<col min="3" max="3" width="5" customWidth="1"/>'
    +'<col min="4" max="4" width="14" customWidth="1"/>'
    +'<col min="5" max="5" width="14" customWidth="1"/>'
    +'<col min="6" max="6" width="22" customWidth="1"/>'
    +'<col min="7" max="7" width="40" customWidth="1"/>'
    +'</cols>'
    +'<sheetData>'+sheetRows+'</sheetData>'
    +'</worksheet>';

  // ── OOXML 파일 구조 (ZIP) ─────────────────────────────
  // JSZip 없이 직접 ZIP 바이너리 생성
  function strToU8(str){
    // TextEncoder는 이모지(surrogate pair, U+10000 이상)도 4바이트 UTF-8로 정상 인코딩
    if(typeof TextEncoder!=='undefined') return new TextEncoder().encode(str);
    // 폴백: surrogate pair 처리 포함한 수동 인코딩
    var bytes=[];
    for(var i=0;i<str.length;i++){
      var c=str.charCodeAt(i);
      // surrogate pair 결합
      if(c>=0xD800&&c<=0xDBFF&&i+1<str.length){
        var c2=str.charCodeAt(i+1);
        if(c2>=0xDC00&&c2<=0xDFFF){
          c=0x10000+((c-0xD800)<<10)+(c2-0xDC00);
          i++;
        }
      }
      if(c<0x80){bytes.push(c);}
      else if(c<0x800){bytes.push(0xc0|(c>>6),0x80|(c&0x3f));}
      else if(c<0x10000){bytes.push(0xe0|(c>>12),0x80|((c>>6)&0x3f),0x80|(c&0x3f));}
      else{bytes.push(0xf0|(c>>18),0x80|((c>>12)&0x3f),0x80|((c>>6)&0x3f),0x80|(c&0x3f));}
    }
    return new Uint8Array(bytes);
  }

  function crc32(buf){
    var table=[];
    for(var n=0;n<256;n++){var c=n;for(var k=0;k<8;k++)c=c&1?0xedb88320^(c>>>1):c>>>1;table[n]=c;}
    var crc=0xffffffff;
    for(var i=0;i<buf.length;i++)crc=table[(crc^buf[i])&0xff]^(crc>>>8);
    return (crc^0xffffffff)>>>0;
  }

  function u32le(n){return [n&0xff,(n>>8)&0xff,(n>>16)&0xff,(n>>24)&0xff];}
  function u16le(n){return [n&0xff,(n>>8)&0xff];}

  function makeLocalFile(name,data){
    var nameBytes=strToU8(name);
    var crc=crc32(data);
    var hdr=[0x50,0x4b,0x03,0x04,0x14,0x00,0x00,0x00,0x00,0x00,0x00,0x00,0x00,0x00]
      .concat(u32le(crc)).concat(u32le(data.length)).concat(u32le(data.length))
      .concat(u16le(nameBytes.length)).concat(u16le(0));
    return {local:new Uint8Array(hdr.concat(Array.from(nameBytes)).concat(Array.from(data))),
            name:nameBytes,crc:crc,size:data.length};
  }

  function buildZip(files){
    var parts=[], offsets=[], pos=0;
    files.forEach(function(f){
      offsets.push(pos);
      parts.push(f.local);
      pos+=f.local.length;
    });
    var cdEntries=[], cdSize=0;
    files.forEach(function(f,i){
      var cd=[0x50,0x4b,0x01,0x02,0x14,0x00,0x14,0x00,0x00,0x00,0x00,0x00,0x00,0x00,0x00,0x00]
        .concat(u32le(f.crc)).concat(u32le(f.size)).concat(u32le(f.size))
        .concat(u16le(f.name.length)).concat(u16le(0)).concat(u16le(0))
        .concat(u16le(0)).concat(u16le(0)).concat(u32le(0)).concat(u32le(offsets[i]))
        .concat(Array.from(f.name));
      cdEntries.push(new Uint8Array(cd));
      cdSize+=cd.length;
    });
    var eocd=[0x50,0x4b,0x05,0x06,0x00,0x00,0x00,0x00]
      .concat(u16le(files.length)).concat(u16le(files.length))
      .concat(u32le(cdSize)).concat(u32le(pos)).concat(u16le(0));
    var total=pos+cdSize+eocd.length;
    var out=new Uint8Array(total), cur=0;
    parts.forEach(function(p){out.set(p,cur);cur+=p.length;});
    cdEntries.forEach(function(c){out.set(c,cur);cur+=c.length;});
    out.set(new Uint8Array(eocd),cur);
    return out;
  }

  var rels='<?xml version="1.0" encoding="UTF-8" standalone="yes"?>'
    +'<Relationships xmlns="http://schemas.openxmlformats.org/package/2006/relationships">'
    +'<Relationship Id="rId1" Type="http://schemas.openxmlformats.org/officeDocument/2006/relationships/officeDocument" Target="xl/workbook.xml"/>'
    +'</Relationships>';

  var wbRels='<?xml version="1.0" encoding="UTF-8" standalone="yes"?>'
    +'<Relationships xmlns="http://schemas.openxmlformats.org/package/2006/relationships">'
    +'<Relationship Id="rId1" Type="http://schemas.openxmlformats.org/officeDocument/2006/relationships/worksheet" Target="worksheets/sheet1.xml"/>'
    +'<Relationship Id="rId2" Type="http://schemas.openxmlformats.org/officeDocument/2006/relationships/sharedStrings" Target="sharedStrings.xml"/>'
    +'<Relationship Id="rId3" Type="http://schemas.openxmlformats.org/officeDocument/2006/relationships/styles" Target="styles.xml"/>'
    +'</Relationships>';

  var wbXml='<?xml version="1.0" encoding="UTF-8" standalone="yes"?>'
    +'<workbook xmlns="http://schemas.openxmlformats.org/spreadsheetml/2006/main" xmlns:r="http://schemas.openxmlformats.org/officeDocument/2006/relationships">'
    +'<sheets><sheet name="골프일지" sheetId="1" r:id="rId1"/></sheets>'
    +'</workbook>';

  var ct='<?xml version="1.0" encoding="UTF-8" standalone="yes"?>'
    +'<Types xmlns="http://schemas.openxmlformats.org/package/2006/content-types">'
    +'<Default Extension="rels" ContentType="application/vnd.openxmlformats-package.relationships+xml"/>'
    +'<Default Extension="xml" ContentType="application/xml"/>'
    +'<Override PartName="/xl/workbook.xml" ContentType="application/vnd.openxmlformats-officedocument.spreadsheetml.sheet.main+xml"/>'
    +'<Override PartName="/xl/worksheets/sheet1.xml" ContentType="application/vnd.openxmlformats-officedocument.spreadsheetml.worksheet+xml"/>'
    +'<Override PartName="/xl/sharedStrings.xml" ContentType="application/vnd.openxmlformats-officedocument.spreadsheetml.sharedStrings+xml"/>'
    +'<Override PartName="/xl/styles.xml" ContentType="application/vnd.openxmlformats-officedocument.spreadsheetml.styles+xml"/>'
    +'</Types>';

  var files=[
    makeLocalFile('[Content_Types].xml',        strToU8(ct)),
    makeLocalFile('_rels/.rels',                strToU8(rels)),
    makeLocalFile('xl/workbook.xml',            strToU8(wbXml)),
    makeLocalFile('xl/_rels/workbook.xml.rels', strToU8(wbRels)),
    makeLocalFile('xl/worksheets/sheet1.xml',   strToU8(sheetXml)),
    makeLocalFile('xl/sharedStrings.xml',       strToU8(sstXml)),
    makeLocalFile('xl/styles.xml',              strToU8(stylesXml))
  ];

  var zipData=buildZip(files);
  var blob=new Blob([zipData],{type:'application/vnd.openxmlformats-officedocument.spreadsheetml.sheet'});
  var url=URL.createObjectURL(blob);
  var a=document.createElement('a');
  var today=new Date();
  var ds=today.getFullYear()+''+(today.getMonth()+1<10?'0':'')+(today.getMonth()+1)+''+(today.getDate()<10?'0':'')+today.getDate();
  a.href=url; a.download='골프일지_'+ds+'.xlsx';
  document.body.appendChild(a); a.click();
  document.body.removeChild(a); URL.revokeObjectURL(url);
}
