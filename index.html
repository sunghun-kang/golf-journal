<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="theme-color" content="#1b3a1b">
<title>강'골프 · 메인</title>
<link rel="icon" href="icon.png">
<style>
  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  body {
    margin: 0;
    min-height: 100vh;
    font-family: -apple-system, BlinkMacSystemFont, "Apple SD Gothic Neo", "Malgun Gothic", sans-serif;
    background: linear-gradient(160deg, #1b3a1b 0%, #0e220e 100%);
    color: #eafaea;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 40px 20px calc(40px + env(safe-area-inset-bottom));
  }
  h1 { font-size: 1.9rem; margin: 8px 0 2px; letter-spacing: -0.5px; }
  .sub { color: #9fc7a0; font-size: 0.85rem; margin-bottom: 32px; }
  .cards { width: 100%; max-width: 460px; display: flex; flex-direction: column; gap: 16px; }
  a.card {
    display: flex; align-items: center; gap: 16px;
    background: rgba(255,255,255,0.06);
    border: 1px solid rgba(255,255,255,0.12);
    border-radius: 18px;
    padding: 20px 22px;
    text-decoration: none; color: inherit;
    transition: transform .12s ease, background .2s ease;
  }
  a.card:active { transform: scale(0.97); background: rgba(255,255,255,0.12); }
  .ic { font-size: 2.4rem; line-height: 1; flex-shrink: 0; }
  .ic img { width: 52px; height: 52px; border-radius: 12px; object-fit: cover; }
  .t { font-size: 1.25rem; font-weight: 700; }
  .d { font-size: 0.82rem; color: #9fc7a0; margin-top: 3px; }
  .arrow { margin-left: auto; color: #6fae71; font-size: 1.4rem; }
  footer { margin-top: 40px; font-size: 0.72rem; color: #6a8a6b; text-align: center; line-height: 1.6; }
</style>
</head>
<body>
  <h1>🏌️ 강'골프</h1>
  <div class="sub">회사 PC·패드·휴대폰 어디서나 열기</div>

  <div class="cards">
    <a class="card" href="golf-swing-journal_25.html">
      <span class="ic">🏌️</span>
      <span>
        <div class="t">강'Story</div>
        <div class="d">개인 골프 스윙 일지</div>
      </span>
      <span class="arrow">›</span>
    </a>

    <a class="card" href="golf-family.html">
      <span class="ic"><img src="icon-family.png" alt=""></span>
      <span>
        <div class="t">랴쟈가족</div>
        <div class="d">가족 이야기</div>
      </span>
      <span class="arrow">›</span>
    </a>
  </div>

  <footer>
    홈 화면에 추가하면 앱처럼 사용할 수 있어요.<br>
    공유 → "홈 화면에 추가"
  </footer>
</body>
</html>
